<!DOCTYPE html>
<html>
<head>
<link  rel="stylesheet" href="./css/index.css">
<script src="./js/index.js" defer></script>
</head>



<body>

<header>
<h1>嗨，我是灵犀 </h1>
<br/>
<p>我能帮到你什么吗？</p>
</header>    

<div class="all-container">
<main class="card-container">
<div class="skill-container">
<p>我是一名前端开发初学者，如何提升相关技能?</p>  
<img class="pencil-icon" src="./assets/pencil.svg" alt="pencil" > 
</div>

<div class="idea-container">
    <p>有哪些平价又新颖的生日礼物适合送朋友。</p>
    <img class="lightbulb-icon"  src="./assets/lightbulb.svg" alt="lightbulb">
</div>
<div class="plan-container">
    <p>准备在家里办一个大型家庭聚会，帮我计划。</p>
    <img class="compass-icon" src="./assets/compass.svg" alt="compass">
</div>

<div class="advice-container">
    <p>带小朋友去野餐，有什么好玩的活动建议吗？</p>
    <img class="wrench-icon" src="./assets/wrench.svg" alt="wrench">
</div>
</main>
</div>


<footer>
<div class="chat-container">
<form  class="chat-form">
    <div class="input-area">
    <textarea name="question" id="question" rows="1"  placeholder="有问题尽管问我"></textarea>
    <button class="transfer-button" id="transfer-button" type="button"> <img src="./assets/paperclip.svg"> </button>
    <button class="submit-button" id="submit-button"  ><img src="./assets/arrow-up.svg"></button>
    <input type="file" id="image-input"  accept="image/*">
    <div id="preview-container">
        <img id="preview-image" src="">
    </div>
    </div>

    
    
</form>
<button  type="button" id="theme-toggle" class="themeToggle-button"><img src="./assets/moon.svg" class="moon-icon" alt="切换到白天模式"></button>
    <button class="delete-button" id="delete-button"><img src="./assets/trash.svg" class="trash-icon"></button>

</div>

<p>内容由AI大模型生成，请仔细甄别</p>
</footer>


<div id="image-viewer">
  <img id="large-image" src="" alt="查看大图" >
</div>

</body>


</html>
